name: Sync CV PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"  # alle 2 Stunden
  push:
    paths:
      - ".github/workflows/sync-cv.yml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Download CV PDF from CV repo
        run: |
          mkdir -p files
          curl -L \
            https://raw.githubusercontent.com/jasonvla/cv/main/CV.pdf \
            -o files/CV.pdf

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add files/CV.pdf

          git diff --cached --quiet && echo "No changes" || (
            git commit -m "🔄 sync CV PDF from cv repo"
            git push
          )